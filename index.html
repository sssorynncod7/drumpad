<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Şahane Drumpad Simülasyonu</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>🎛️ Şahane Drumpad</h1>
      <p>Davul, saz, mızıka ve daha fazlası — FL tarzı satır düzeniyle çal.</p>
    </header>

    <main>
      <section class="controls">
        <label>
          Master Ses
          <input id="volume" type="range" min="0" max="1" step="0.01" value="0.75" />
        </label>
        <button id="stopAll">Tüm Sesleri Kes</button>
      </section>

      <section id="padGrid" class="pad-grid" aria-label="Drumpad"></section>

      <section class="beat-section" aria-label="Beat oluşturucu">
        <div class="beat-topbar">
          <h2>🥁 Beat Yapıcı</h2>
          <div class="beat-actions">
            <label>
              BPM
              <input id="bpm" type="number" min="60" max="180" value="120" />
            </label>
            <button id="playBeat">Beat'i Çal</button>
            <button id="stopBeat">Beat'i Durdur</button>
            <button id="clearBeat">Deseni Temizle</button>
          </div>
        </div>
        <p class="hint">Her satır bir enstrüman, her kutu bir adım (16 step). Kutulara tıklayarak beat yaz.</p>
        <div id="sequencer" class="sequencer"></div>
      </section>
    </main>

    <template id="padTemplate">
      <button class="pad">
        <span class="key"></span>
        <span class="name"></span>
        <span class="family"></span>
      </button>
    </template>

    <script src="app.js"></script>
  </body>
</html>
